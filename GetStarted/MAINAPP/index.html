<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Goal Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .link { fill: none; stroke: #475569; stroke-width: 2px; transition: all 0.3s; }
        .node rect { transition: all 0.3s ease; cursor: pointer; }
        #graph { background-color: #0f172a; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">

    <div class="fixed top-6 left-6 z-50">
        <h1 id="goalHeading" class="text-indigo-400 text-xl font-black uppercase tracking-tighter bg-slate-800/50 p-3 rounded-lg border border-slate-700 shadow-xl">
            GOAL: LOADING...
        </h1>
    </div>

    <div class="fixed top-6 right-6 z-50 bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-2xl w-64">
        <div class="flex justify-between mb-2">
            <span class="text-slate-400 text-xs font-bold uppercase">Progress</span>
            <span id="progressText" class="text-indigo-400 text-xs font-bold">0%</span>
        </div>
        <div class="w-full bg-slate-700 h-2 rounded-full overflow-hidden">
            <div id="progressBar" class="bg-indigo-500 h-full transition-all duration-700" style="width: 0%"></div>
        </div>
    </div>

    <svg id="graph" class="w-screen h-screen"></svg>

    <div id="quizModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
            <div class="mb-6">
                <span class="text-indigo-500 font-bold text-xs uppercase tracking-widest">Knowledge Check</span>
                <p id="quizQuestion" class="text-white text-lg mt-2 leading-relaxed">Loading question...</p>
            </div>
            
            <input id="quizInput" type="text" 
                class="w-full bg-slate-800 border border-slate-700 p-4 rounded-xl text-white mb-6 focus:ring-2 focus:ring-indigo-500 outline-none"
                placeholder="Type your answer here..." autocomplete="off">
            
            <div class="flex gap-3">
                <button onclick="submitAnswer()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all">OK</button>
                <button onclick="closeQuiz()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 rounded-xl transition-all">Cancel</button>
            </div>
        </div>
    </div>

    <script src="vex_fix_js.js"></script>
</body>
</html>
