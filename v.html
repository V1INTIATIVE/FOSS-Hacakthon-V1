<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> TulipAI  </title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
</head>

<style>

    h1 {
        color: #4CAF50;
        text-align: center;
        margin-top: 50px;
        padding: 20px;
        border-radius: 10px;
        background-color: #f0f0f0;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        size: 36px;
        font-family: sans-serif;
        font-weight: bold;
    }

    p {
        color: #333;
        font-size: 18px;
        line-height: 1.6;
        margin: 20px auto;
        max-width: 600px;
        text-align: center;
    }

    label {
        display: block;
        margin: 20px auto 10px;
        font-size: 16px;
        color: #555;
        text-align: center;
    }

    select {
        display: block;
        margin: 0 auto 20px;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
        width: 200px;
    }

    button {
        display: block;
        margin: 20px auto;
        padding: 10px 20px;
        font-size: 16px;
        color: #fff;
        background: linear-gradient(45deg, #4CAF50, #45a049);
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: inset 0 0 0 rgba(255, 255, 255, 0.5);
    }

  .corner {
        position: fixed;
        top: 10px;
        right: 10px;
        font-size: 12px;
        color: #999;
        font-family: sans-serif;
        font-weight: normal;
    }



</style>


<body>

<noscript>
    <p>Your browser does not support JavaScript. Please enable it to use this application.</p>
</noscript>

<h1 class="animate__bounceIn">Welcome to TulipAI</h1>
<p class="animate__fadeIn">TulipAI is an AI-powered application designed to assist you with various tasks. Please explore the features and enjoy your experience!</p>

<p class="corner">version 1.0</p>


<label for="class">Choose your class:</label>
<select id="class" name="class" required>
    <option value=blank disabled selected>Select your class</option>
    <option value="9">Class 9</option>
    <option value="10">Class 10</option>
    <option value="11">Class 11</option>
    <option value="12">Class 12</option>
</select>

<label for="Subjects">Choose your subject:</label>
<select id="Subjects" name="Subjects" required>
    <option value=blank disabled selected>Select your subject</option>
    <option value="Math">Math</option>
    <option value="Science">Science</option>
    <option value="English">English</option>
    <option value="History">History</option>
    <option value="Geography">Geography</option>
    <option value="Computer Science">Computer Science</option>
</select>


<label for="mode">Choose your mode of study:</label>
<select id="mode" name="mode" required>
    <option value=blank disabled selected>Select your mode</option>
    <option value="9">Learn</option>
    <option value="10">Practice</option>
    <option value="11">Test</option>
    <option value="12">Review</option>
</select>

<form id="button-form" action="main.html" method='get'></form>
<button id="learnButton" form="button-form">
    
    Start Learning

</button>


<script src="v.js"></script>



<footer>
    <p style="text-align: center; color: #777; margin-top: 50px;">Free and Open-Sourced Software(FOSS)</p>
</footer>



</body>
</html>
