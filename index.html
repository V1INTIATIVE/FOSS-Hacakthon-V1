<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="style.css">

  <style>
body {
  background: #01042d;
  color: white;
  font-family: sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#box {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  width: 90%;
  max-width: 400px;
}

input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(270deg, #667eea, #764ba2);
  color: white;
  cursor: pointer;
} 


    
  </style>
</head>
<body>

<div id="box">
  <h1>Start Your Journey</h1>

  <input id="name" placeholder="Your Name">
  <input id="goal" placeholder="Your Main Goal">
  <input id="x" placeholder="Sarvam API Key">

  <button onclick="signup()">Continue</button>
</div>

<script src="script.js"></script>
</body>
</html>
